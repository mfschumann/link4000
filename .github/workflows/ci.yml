name: CI

on:
  push:
    paths-ignore:
      - "*.md"
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Unit Tests (${{ matrix.environment }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        environment: [dev, prod-test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          environments: ${{ matrix.environment }}
          cache: true
          frozen: true

      - name: Lint
        if: matrix.environment == 'dev'
        run: pixi run -e dev ruff check .

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: pixi run -e ${{ matrix.environment }} pytest tests/ -v --cov=link4000 --cov-branch --cov-report=xml --junitxml=junit.xml -o junit_family=legacy

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: unittests
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}