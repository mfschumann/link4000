name: CI

on:
  push:
    paths-ignore:
      - "*.md"
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Unit Tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          environments: dev
          cache: true
          frozen: true

      - name: Lint
        run: pixi run -e dev ruff check .

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: pixi run -e dev pytest tests/ -v --cov=link4000 --cov-report=xml

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests