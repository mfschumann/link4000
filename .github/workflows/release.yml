name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      artifact_retention_days:
        description: 'Number of days to retain build artifacts'
        required: false
        default: '30'
        type: string

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Get tag annotation
        id: tag_annotation
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          ANNOTATION=$(git tag -l --format='%(contents)' "$TAG_NAME")
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          # Use heredoc to preserve multiline content
          echo "annotation<<EOF" >> $GITHUB_OUTPUT
          echo "$ANNOTATION" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe  # v2.6.1
        with:
          tag_name: ${{ steps.tag_annotation.outputs.tag_name }}
          name: Release ${{ steps.tag_annotation.outputs.tag_name }}
          body: ${{ steps.tag_annotation.outputs.annotation }}
          draft: false
          prerelease: false
          generate_release_notes: true
